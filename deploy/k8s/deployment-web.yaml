apiVersion: apps/v1
kind: Deployment
metadata:
  name: __PROJECT_SLUG__-web
  labels:
    app.kubernetes.io/name: __PROJECT_SLUG__
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: __PROJECT_SLUG__
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __PROJECT_SLUG__
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: ghcr.io/__OWNER__/__PROJECT_SLUG__:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: __PORT__
          envFrom:
            - configMapRef:
                name: __PROJECT_SLUG__-config
            - secretRef:
                name: __PROJECT_SLUG__-secrets
          startupProbe:
            httpGet:
              path: /healthz
              port: __PORT__
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: __PORT__
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: __PORT__
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
