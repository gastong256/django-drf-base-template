apiVersion: apps/v1
kind: Deployment
metadata:
  name: __PROJECT_SLUG__-worker
  labels:
    app.kubernetes.io/name: __PROJECT_SLUG__
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: __PROJECT_SLUG__
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __PROJECT_SLUG__
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/__OWNER__/__PROJECT_SLUG__:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "INFO", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: __PROJECT_SLUG__-config
            - secretRef:
                name: __PROJECT_SLUG__-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
