name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect template state
    runs-on: ubuntu-latest
    outputs:
      initialized: ${{ steps.check.outputs.initialized }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -q "__PROJECT_SLUG__" pyproject.toml; then
            echo "initialized=false" >> "$GITHUB_OUTPUT"
          else
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: CI
    needs: detect
    if: needs.detect.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.*"

      - name: Install deps
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run black --check .

      - name: Typecheck
        run: uv run pyright

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r apps config

      - name: Check pending migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_db
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django deploy checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-deploy-check-secret
          DJANGO_ALLOWED_HOSTS: api.example.com
          CSRF_TRUSTED_ORIGINS: https://api.example.com
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_db
        run: uv run python manage.py check --deploy --fail-level WARNING

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_db
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Build Docker image
        run: docker build -t app:ci .
