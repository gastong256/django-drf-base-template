name: Security

on:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: Detect template state
    runs-on: ubuntu-latest
    outputs:
      initialized: ${{ steps.check.outputs.initialized }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if grep -q "__PROJECT_SLUG__" pyproject.toml; then
            echo "initialized=false" >> "$GITHUB_OUTPUT"
          else
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          fi

  audit:
    name: Dependency and static audits
    needs: detect
    if: needs.detect.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.4.*"

      - name: Install deps
        run: uv sync

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r apps config

      - name: pip-audit
        run: uv run pip-audit
